name: Go CI

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [form_submitted]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - run: go mod tidy
      - run: go build -v ./...
      - run: go test ./... || true

     
      - name: Show form submission
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Name: ${{ github.event.client_payload.name }}"
          echo "Email: ${{ github.event.client_payload.email }}"
          echo "Message: ${{ github.event.client_payload.message }}"

     
      # - name: SonarQube Scan
      #   uses: sonarsource/sonarqube-scan-action@v2
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      
      - run: docker build -t go-form .

     
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

   
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: go-form
          format: table
          exit-code: 0