name: Go CI 

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [form_submitted]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5  
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: go mod tidy

      - name: Build Go app
        run: go build -v ./...

      - name: Run tests
        run: go test ./... || true

      - name: Build Docker image
        run: docker build -t go-form .
