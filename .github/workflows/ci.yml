name: Go CI

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [form_submitted]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - run: go mod tidy
      - run: go build -v ./...
      - run: go test ./... || true

      - name: Show form submission
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Name: ${{ github.event.client_payload.name }}"
          echo "Email: ${{ github.event.client_payload.email }}"
          echo "Message: ${{ github.event.client_payload.message }}"

      - run: docker build -t go-form .